apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploysentry-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: deploysentry
  template:
    metadata:
      labels:
        app: deploysentry
    spec:
      containers:
        - name: deploysentry-container
          image: deploysentry:latest
          ports:
            - containerPort: 5000
